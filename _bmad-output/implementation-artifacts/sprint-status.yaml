# STATUS DEFINITIONS:
# ==================
# Epic Status:
#   - backlog: Epic not yet started
#   - in-progress: Epic actively being worked on
#   - done: All stories in epic completed
#   - done-with-sunk-cost: Epic closed; some deliverables superseded by a later pivot
#   - superseded-by-epic-{N}: Epic content is functionally absorbed by another epic
#
# Story Status:
#   - backlog: Story only exists in epic file
#   - ready-for-dev: Story file created in stories folder
#   - in-progress: Developer actively working on implementation
#   - review: Ready for code review (via Dev's code-review workflow)
#   - done: Story completed
#   - deferred: Explicitly deferred to a future phase
#   - blocked-by-{thing}: Story file may exist but AC pending an unresolved decision
#   - superseded-by-{ref}: Functionality replaced by another story
#   - sunk-cost-preserved: Story is done but part of its output is discarded under a later pivot

